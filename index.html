<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月亮</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 50%, #2a2a6e 100%);
      overflow: hidden;
    }

    .sky {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    /* 星星 */
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* 月亮 */
    .moon-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .moon {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 60% 40%, #fffde7, #ffd54f 40%, #ffb300);
      box-shadow:
        0 0 60px rgba(255, 235, 160, 0.6),
        0 0 120px rgba(255, 220, 130, 0.3),
        0 0 200px rgba(255, 200, 100, 0.15);
      position: relative;
      animation: glow 4s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 60px rgba(255, 235, 160, 0.6), 0 0 120px rgba(255, 220, 130, 0.3), 0 0 200px rgba(255, 200, 100, 0.15); }
      50% { box-shadow: 0 0 80px rgba(255, 235, 160, 0.8), 0 0 150px rgba(255, 220, 130, 0.4), 0 0 240px rgba(255, 200, 100, 0.25); }
    }

    /* 月坑 */
    .crater {
      position: absolute;
      background: rgba(200, 160, 80, 0.35);
      border-radius: 50%;
    }

    .crater-1 { width: 30px; height: 30px; top: 40px; left: 50px; }
    .crater-2 { width: 20px; height: 20px; top: 80px; left: 120px; }
    .crater-3 { width: 25px; height: 25px; top: 130px; left: 60px; }
    .crater-4 { width: 15px; height: 15px; top: 100px; left: 40px; }
    .crater-5 { width: 18px; height: 18px; top: 60px; left: 140px; }

    /* 地球照 */
    .earthshine {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(
        circle at 35% 45%,
        transparent 60%,
        rgba(100, 140, 200, 0.08) 100%
      );
      top: 0;
      left: 0;
    }

    /* 月晕 */
    .moon-halo {
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      top: -20px;
      left: -20px;
      background: radial-gradient(
        circle at 50% 50%,
        transparent 82%,
        rgba(255, 255, 255, 0.03) 100%
      );
    }

    /* 云 */
    .cloud {
      position: absolute;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 50%;
      filter: blur(30px);
      animation: float linear infinite;
    }

    .cloud-1 {
      width: 300px;
      height: 80px;
      top: 20%;
      animation-duration: 25s;
    }

    .cloud-2 {
      width: 250px;
      height: 60px;
      top: 65%;
      left: 60%;
      animation-duration: 30s;
      animation-delay: -8s;
    }

    @keyframes float {
      from { transform: translateX(-350px); }
      to { transform: translateX(calc(100vw + 350px)); }
    }

    /* 标题 */
    .title {
      position: absolute;
      bottom: 80px;
      width: 100%;
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 24px;
      letter-spacing: 4px;
      animation: fadeIn 2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="sky">
    <!-- 星空 -->
    <div class="stars" id="stars"></div>

    <!-- 云 -->
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>

    <!-- 月亮 -->
    <div class="moon-container">
      <div class="moon">
        <div class="crater crater-1"></div>
        <div class="crater crater-2"></div>
        <div class="crater crater-3"></div>
        <div class="crater crater-4"></div>
        <div class="crater crater-5"></div>
        <div class="earthshine"></div>
      </div>
      <div class="moon-halo"></div>
    </div>

    <!-- 标题 -->
    <div class="title">🌙 明 月</div>
  </div>

  <script>
    // 生成随机星星
    const starsContainer = document.getElementById('stars');
    const starCount = 100;

    for (let i = 0; i < starCount; i++) {
      const star = document.createElement('div');
      star.classList.add('star');

      const size = Math.random() * 3 + 1;
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const duration = Math.random() * 3 + 2;
      const delay = Math.random() * 5;

      star.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${x}%;
        top: ${y}%;
        --duration: ${duration}s;
        --delay: ${delay}s;
      `;

      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
